<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adamngshrine dream journal</title>
    <link rel="icon" href="https://media.adamngshrine.com/images/logo-01-01.png" type="image/x-icon">
    <style>
        body {
            background: rgb(5, 5, 5);
            color: rgb(246, 246, 246);
            text-align: center;
            font-style: italic;

            a {
                margin: 0 6px;
                color: rgb(240, 190, 190);
                text-decoration: none;
            }
        }

        .adamngs {
            font-size: 2rem;
        }

        .title {
            font-size: 8rem;
            color: #fff;
            margin-bottom: 40px;
            text-shadow: 0 0 6px #fff;
            animation: glow 20s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 12px #fff; }
            50%      { text-shadow: 0 0 6px #fff; }
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0 auto;
            padding: 20px;
            font-size: 14px;

            &_options a {
                margin: 0 6px;
                color: rgb(240, 190, 190);
                text-decoration: none;
            }
        }

        .content {
            max-width: 50rem;
            margin: 0 auto;
            box-sizing: border-box;
        }

        .dreamlog {
            margin: 20px 0;
            padding: 20px;
            border-radius: 24px 24px 8px 24px;
            background: #202020;

            transition:
                background-color .25s ease,
                box-shadow .25s ease;

            > * {
                font-size: 18px;
                margin: 10px 0;
                text-align: start;
                line-height: 25px;
            }

            p {
                filter: blur(3px);
                opacity: .55;
                transition:
                    filter .25s ease,
                    opacity .25s ease;
            }

            &:hover,
            &:focus-within {
                background: #2a2a2a;

                p {
                    filter: blur(0);
                    opacity: 1;
                }

                .time-mood {
                    color: rgb(245, 228, 228);
                }
            }
        }

        .time-mood {
            margin: 0;
            color: rgb(231, 204, 204);
        }

        .status-msg {
            opacity: .6;
        }

        @media (max-width: 600px) {
            .dreamlog {
                width: 90%;
                margin: 20px auto;

                > * {
                    line-height: 25px;
                }
            }
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="nav_logo">
            <a href="/"><img src="https://media.adamngshrine.com/images/logo-01-01.png" alt="modernlogo" width="40px"></a>
        </div>
        <div class="nav_options">
            <a href="/">home</a>
            <a href="/index/AUportal.html">back to AU portal</a>
        </div>
    </div>
    <div class="adamngs" id="start">adamng04's</div>
    <div class="title">dream journal</div>
    <div class="content">
        <p>Dreams cannot be remembered forever. Hover over an entry to recall it.</p>
        <div id="dreamlog-container">
            <p class="status-msg">loading dreams...</p>
        </div>
    </div>
    <div class="footer">inspired by <a target="_blank" href="https://eyeorb.net/dreams.html">eyeorb's dreamlog</a></div>
    <a href="#start">back to top</a>

    <script>
        function setStatus(container, message) {
            container.textContent = '';
            const p = document.createElement('p');
            p.className = 'status-msg';
            p.textContent = message;
            container.appendChild(p);
        }

        function buildDreamEntry(dream) {
            const entry = document.createElement('div');
            entry.className = 'dreamlog';

            const timeMood = document.createElement('div');
            timeMood.className = 'time-mood';
            timeMood.textContent = `${dream.date} \u2726 mood: ${dream.mood}`;

            const text = document.createElement('p');
            text.textContent = dream.text;

            entry.appendChild(timeMood);
            entry.appendChild(text);
            return entry;
        }

        async function loadDreams() {
            const container = document.getElementById('dreamlog-container');
            try {
                const response = await fetch('dreams.json');
                if (!response.ok) throw new Error('Failed to fetch dreams.json');
                const dreams = await response.json();

                if (!Array.isArray(dreams) || dreams.length === 0) {
                    setStatus(container, 'No dreams yet.');
                    return;
                }

                container.textContent = '';
                const fragment = document.createDocumentFragment();
                dreams.forEach(dream => fragment.appendChild(buildDreamEntry(dream)));
                container.appendChild(fragment);
            } catch (err) {
                setStatus(container, "couldn't load dreams.json — make sure it's in the same folder as this page.");
                console.error(err);
            }
        }

        loadDreams();
    </script>
</body>
</html>
